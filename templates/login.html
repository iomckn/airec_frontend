<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AiRec - Connexion</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

  <header class="topbar">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/airec_logo.png') }}" alt="Logo">
        </div>

        <nav class="navlinks">
            <a href="{{ url_for('index') }}">Accueil</a>
            <a href="{{ url_for('categories') }}">Catégorie</a>
            <a href="#">Se connecter/S'inscrire</a>
        </nav>

        <div class="spacer"></div>


        <form class="search" action="{{ url_for('recherche_film') }}" method="GET">
            <span>🔎</span>
            <input type="text" name="q" placeholder="Chercher un film , série ..." required>
        </form>
    </header>

  <main class="wrap">
    <section class="card">
      <img class="logo-center" src="{{ url_for('static', filename='images/airec_logo.png') }}" alt="AiRec">

      <h2 class="title">Se connecter</h2>

      {% if login_error %}
      <p class="login-feedback login-error">{{ login_error }}</p>
      {% endif %}
      {% if login_success %}
      <p class="login-feedback login-success">Connexion réussie, redirection en cours...</p>
      {% endif %}

      <form class="form" method="POST" action="{{ url_for('login') }}">
        <label class="field">
          <span>Email :</span>
          <input type="email" name="email" value="{{ email or '' }}" required>
        </label>

        <label class="field">
          <span>Mot de passe :</span>
          <input type="password" name="password" required>
        </label>

        
        <button class="btn" type="submit">Connexion</button>
      </form>

      <a class="forgot" href="#">Mot de passe oublié ?</a>

      <p class="signup">
        Nouveau sur AIREC ?
        <a href="{{ url_for('register') }}">Inscrivez-vous maintenant</a>
      </p>
    </section>
  </main>

  {% if login_success %}
  <div
    id="loginPayload"
    data-access-token="{{ access_token }}"
    data-refresh-token="{{ refresh_token }}"
    hidden
  ></div>
  <script>
    const payloadEl = document.getElementById("loginPayload");
    const accessToken = payloadEl ? payloadEl.dataset.accessToken || "" : "";
    const refreshToken = payloadEl ? payloadEl.dataset.refreshToken || "" : "";
    localStorage.setItem("access_token", accessToken);
    localStorage.setItem("refresh_token", refreshToken);
    setTimeout(function () {
      window.location.href = "{{ url_for('index') }}";
    }, 700);
  </script>
  {% endif %}

</body>
</html>
