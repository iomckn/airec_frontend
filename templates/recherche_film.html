<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">AiRec - Film</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/recherche_film.css') }}">
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <img src="{{ url_for('static', filename='images/airec_logo.png') }}" alt="Logo">
    </div>

    <nav class="navlinks">
      <a href="{{ url_for('index') }}">Accueil</a>
      <a href="{{ url_for('categories') }}">Catégorie</a>
      <a href="{{ url_for('login') }}">Se connecter/S'inscrire</a>
    </nav>

    <div class="spacer"></div>

    <form class="search" action="{{ url_for('recherche_film') }}" method="GET">
      <span>🔎</span>
      <input type="text" name="q" placeholder="Chercher un film, série ..." required>
    </form>
  </header>

  <!-- PAGE -->
  <main class="page">

    <div id="loadingState" class="loading-state">
      <p id="loadingMsg">Chargement...</p>
    </div>

    <div id="errorState" class="error-state" style="display:none;">
      <p id="errorMsg">Impossible de charger le film. Veuillez réessayer.</p>
    </div>

    <!-- RÉSULTATS DE RECHERCHE -->
    <section id="searchSection" style="display:none;">
      <h2 class="search-results-title" id="searchTitle"></h2>
      <div class="search-grid" id="searchGrid"></div>
      <p class="search-empty" id="searchEmpty" style="display:none;">
        Aucun film trouvé pour cette recherche.
      </p>
    </section>

    <section class="hero" id="heroSection" style="display:none;">
      <div class="left">
        <h1 class="title" id="movieTitle">—</h1>
        <p class="meta" id="movieMeta">—</p>

        <div class="poster-wrap">
          <img class="poster" id="moviePoster" src="" alt="Affiche du film">
        </div>

        <div class="genres" id="movieGenres"></div>
      </div>

      <div class="right">
        <h2 class="section-title">Description</h2>
        <p class="desc" id="movieDesc">—</p>

        <div class="ratings">
          <div class="line">
            <span class="label">Avis(<span id="reviewCount">0</span>) :</span>
            <div class="stars static" id="avgStars" aria-label="Note moyenne"></div>
            <span class="score" id="avgScore">—/5</span>
          </div>

          <div class="line">
            <span class="label">Mon avis :</span>
            <div class="stars user" id="userStars" role="radiogroup" aria-label="Votre note">
              <button type="button" class="star-btn" data-value="1" aria-label="1 étoile">★</button>
              <button type="button" class="star-btn" data-value="2" aria-label="2 étoiles">★</button>
              <button type="button" class="star-btn" data-value="3" aria-label="3 étoiles">★</button>
              <button type="button" class="star-btn" data-value="4" aria-label="4 étoiles">★</button>
              <button type="button" class="star-btn" data-value="5" aria-label="5 étoiles">★</button>
            </div>
            <span class="my-score"><span id="myScore">0</span>/5</span>
            <span class="rating-status" id="ratingStatus"></span>
            <input type="hidden" id="ratingValue" name="rating" value="0">
          </div>
        </div>
      </div>
    </section>

    <section class="reco" id="recoSection" style="display:none;">
      <h3 class="reco-title">Vous pourriez aussi aimer...</h3>
      <div class="carousel">
        <button class="car-arrow left" type="button" aria-label="Précédent" id="prevBtn">‹</button>
        <div class="car-track" id="track"></div>
        <button class="car-arrow right" type="button" aria-label="Suivant" id="nextBtn">›</button>
      </div>
    </section>

  </main>

  <script src="{{ url_for('static', filename='js/recherche_film.js') }}"></script>
</body>
</html>
